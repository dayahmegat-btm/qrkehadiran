name: Database Backup

on:
  schedule:
    # Run daily at 2:00 AM UTC (10:00 AM Malaysia Time)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: Backup Production Database
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set backup filename
        id: backup
        run: |
          BACKUP_DATE=$(date +%Y%m%d-%H%M%S)
          BACKUP_FILE="edaftar-kedah-${BACKUP_DATE}.sql.gz"
          echo "filename=${BACKUP_FILE}" >> $GITHUB_OUTPUT
          echo "date=${BACKUP_DATE}" >> $GITHUB_OUTPUT

      - name: Create database backup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_DB_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          script: |
            # Create backup directory
            mkdir -p ~/backups/database

            # Dump database with gzip compression
            mysqldump \
              --host=${{ secrets.PROD_DB_HOST }} \
              --user=${{ secrets.PROD_DB_USER }} \
              --password=${{ secrets.PROD_DB_PASSWORD }} \
              --single-transaction \
              --routines \
              --triggers \
              --events \
              --databases ${{ secrets.PROD_DB_NAME }} \
              | gzip > ~/backups/database/${{ steps.backup.outputs.filename }}

            # Verify backup file was created
            if [ ! -f ~/backups/database/${{ steps.backup.outputs.filename }} ]; then
              echo "Error: Backup file was not created"
              exit 1
            fi

            # Check backup file size (should be > 1KB)
            FILESIZE=$(stat -f%z ~/backups/database/${{ steps.backup.outputs.filename }} 2>/dev/null || stat -c%s ~/backups/database/${{ steps.backup.outputs.filename }})
            if [ $FILESIZE -lt 1024 ]; then
              echo "Error: Backup file is too small (${FILESIZE} bytes)"
              exit 1
            fi

            echo "✅ Backup created successfully: ${{ steps.backup.outputs.filename }} (${FILESIZE} bytes)"

      - name: Download backup to GitHub Actions
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_DB_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          source: "~/backups/database/${{ steps.backup.outputs.filename }}"
          target: "./backups"

      - name: Upload backup to S3
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Copy backup to S3
        run: |
          aws s3 cp \
            backups/${{ steps.backup.outputs.filename }} \
            s3://${{ secrets.BACKUP_S3_BUCKET }}/database/${{ steps.backup.outputs.filename }} \
            --storage-class STANDARD_IA

      - name: Cleanup old backups on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_DB_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          script: |
            # Keep only the last 7 days of local backups
            cd ~/backups/database
            ls -t edaftar-kedah-*.sql.gz | tail -n +8 | xargs -r rm
            echo "✅ Cleaned up old local backups (kept last 7 days)"

      - name: Cleanup old backups on S3
        run: |
          # Keep backups for 90 days on S3
          RETENTION_DATE=$(date -d '90 days ago' +%Y%m%d 2>/dev/null || date -v-90d +%Y%m%d)

          aws s3 ls s3://${{ secrets.BACKUP_S3_BUCKET }}/database/ \
            | awk '{print $4}' \
            | grep 'edaftar-kedah-' \
            | while read file; do
              FILE_DATE=$(echo $file | grep -oP '\d{8}' | head -1)
              if [ "$FILE_DATE" -lt "$RETENTION_DATE" ]; then
                echo "Deleting old backup: $file"
                aws s3 rm s3://${{ secrets.BACKUP_S3_BUCKET }}/database/$file
              fi
            done

          echo "✅ Cleaned up old S3 backups (kept last 90 days)"

      - name: Send notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Database backup completed successfully: ${{ steps.backup.outputs.filename }}"
          else
            echo "❌ Database backup failed"
            # Here you can add Slack/email notification logic
          fi
